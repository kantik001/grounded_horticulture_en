<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Помощник Садовода — чат</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <header class="chat-header">
        <h1 id="headerTitle">🍏 Помощник Садовода</h1>
        <p id="headerSubtitle">Текст — ответ по статьям (RAG). Фото — классификация и советы.</p>
        <label class="crop-row">
            <span id="cropLabel">Культура</span>
            <select id="cropSelect" aria-label="Выбор культуры"></select>
        </label>
        <p class="disclaimer" id="headerDisclaimer">Справочная информация. Не заменяет очный осмотр агронома. Решения по препаратам — с учётом инструкций и законодательства.</p>
    </header>

    <div class="onboarding" id="onboardingRoot" hidden>
        <div class="onboarding-title" id="onboardingTitle">Примеры вопросов</div>
        <div class="onboarding-chips" id="onboardingChips"></div>
    </div>

    <div class="chat-scroll" id="chatScroll" aria-live="polite">
        <div class="day-divider" id="chatDivider">Диалог с агрономом</div>
        <div id="messagesRoot"></div>
    </div>

    <div class="typing" id="typingLine">Ассистент печатает…</div>

    <div class="composer-wrap">
        <div class="attachment-strip" id="attachmentStrip" aria-hidden="true">
            <img id="attachmentThumb" alt="">
            <span id="attachmentLabel">Фото к сообщению</span>
            <button type="button" class="clear" id="clearAttachment">Убрать</button>
        </div>
        <div class="composer">
            <input type="file" id="fileInput" accept="image/*" hidden>
            <button type="button" class="icon-btn" id="attachBtn" title="Прикрепить фото" aria-label="Прикрепить фото">📎</button>
            <textarea id="inputText" rows="1" maxlength="4000" placeholder="Сообщение…" aria-label="Текст сообщения"></textarea>
            <button type="button" class="send-btn" id="sendBtn" title="Отправить" aria-label="Отправить">➤</button>
        </div>
    </div>

    <div class="toast" id="toast" role="status"></div>
    <script src="app.js" defer></script>
</body>
</html>
