server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    
    # Проксирование API запросов на Go сервер
    location /api {
        rewrite ^/api(.*)$ $1 break;
        proxy_pass http://server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Добавляем заголовок Content-Type для корректной кодировки
        add_header Content-Type "application/json; charset=utf-8" always;
    }
    
    # Правильное место для заголовков - внутри location
    location / {
        try_files $uri $uri/ /index.html;
        
        # Добавляем заголовки здесь, внутри location
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    }

    # Кэширование статики (опционально)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
