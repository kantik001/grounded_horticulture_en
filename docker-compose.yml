services:
  postgres:
    image: postgres:16-alpine
    container_name: union_ai_apple_postgres
    environment:
      POSTGRES_USER: gardener
      POSTGRES_PASSWORD: gardener
      POSTGRES_DB: gardener
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gardener -d gardener"]
      interval: 5s
      timeout: 5s
      retries: 10

  classifier:
    build:
      context: .
      dockerfile: Dockerfile.classifier
    container_name: union_ai_apple_classifier
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - MODEL_PATH=../models/apple_classifier.pth
      - CLASSIFIER_PORT=5000
    volumes:
      - models:/app/models
      - chroma_data:/app/chroma_db
      - ./classifier:/app/classifier:ro
      - ./rag:/app/rag:ro
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: union_ai_apple_server
    ports:
      - "8080:8080"
    environment:
      - CLASSIFIER_URL=http://classifier:5000/classify
      - CLASSIFIER_RAG_URL=http://classifier:5000/rag/context
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://openrouter.ai/api}
      - LLM_MODEL=${LLM_MODEL:-openrouter/free}
      - SERVER_PORT=8080
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_AUTH_DISABLED=${TELEGRAM_AUTH_DISABLED:-false}
      - TELEGRAM_INIT_DATA_MAX_AGE_SEC=${TELEGRAM_INIT_DATA_MAX_AGE_SEC:-86400}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      - RATE_LIMIT_REQUESTS_PER_MINUTE=${RATE_LIMIT_REQUESTS_PER_MINUTE:-30}
      - DATABASE_URL=postgres://gardener:gardener@postgres:5432/gardener?sslmode=disable
      - UPLOAD_DIR=/data/uploads
      - MIGRATIONS_DIR=/migrations
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      classifier:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  webapp:
    build:
      context: .
      dockerfile: Dockerfile.webapp
    container_name: union_ai_apple_webapp
    ports:
      - "80:80"
    volumes:
      - ./webapp/index.html:/usr/share/nginx/html/index.html:ro
      - ./webapp/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  models:
  chroma_data:
  postgres_data:
  uploads_data:
