# Имя проекта Compose (сеть/volumes). Совпадает с Makefile PROJECT_NAME.
# Продакшен: задайте POSTGRES_PASSWORD, ADMIN_PASSWORD, ADMIN_SECRET, TELEGRAM_BOT_TOKEN в .env.
# После изменений data/: make docker-reindex-apply (Chroma + BM25 reindex + restart classifier).
name: union_ai_apple

services:
  postgres:
    image: postgres:16-alpine
    container_name: union_ai_apple_postgres
    # Продакшен: задайте POSTGRES_PASSWORD в .env (не gardener/gardener).
    environment:
      POSTGRES_USER: gardener
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gardener}
      POSTGRES_DB: gardener
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gardener -d gardener"]
      interval: 5s
      timeout: 5s
      retries: 10

  classifier:
    build:
      context: .
      dockerfile: Dockerfile.classifier
    container_name: union_ai_apple_classifier
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - MODEL_PATH=models/apple_classifier.pth
      - CLASSIFIER_PORT=5000
      - CROPS_CONFIG_PATH=/config/crops.json
      - CV_CLASS_LABELS_PATH=/config/cv_class_labels.json
      - FORCE_RAG_REINDEX=${FORCE_RAG_REINDEX:-false}
      - ADMIN_SECRET=${ADMIN_SECRET:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      - PYTHONUTF8=1
      - PYTHONIOENCODING=utf-8
      - HF_TOKEN=${HF_TOKEN:-}
      - RAG_WARMUP_ENABLED=${RAG_WARMUP_ENABLED:-true}
      - AGRO_GLOSSARY_PATH=/config/agro_glossary.json
    volumes:
      - models:/app/models
      - chroma_data:/app/chroma_db
      - bm25_data:/app/bm25_db
      - ./api:/app/api:ro
      - ./cv:/app/cv:ro
      - ./rag:/app/rag:ro
      - ./data:/app/data:ro
      - ./config:/config:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 300s

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: union_ai_apple_server
    ports:
      - "8080:8080"
    environment:
      - CLASSIFIER_URL=http://classifier:5000/classify
      - CLASSIFIER_RAG_URL=http://classifier:5000/rag/context
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://openrouter.ai/api}
      - LLM_MODEL=${LLM_MODEL:-google/gemini-2.5-flash-lite}
      - SERVER_PORT=8080
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - API_KEYS=${API_KEYS:-}
      - API_KEYS_FILE=${API_KEYS_FILE:-}
      - TELEGRAM_AUTH_DISABLED=${TELEGRAM_AUTH_DISABLED:-false}
      - TELEGRAM_INIT_DATA_MAX_AGE_SEC=${TELEGRAM_INIT_DATA_MAX_AGE_SEC:-86400}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      - RATE_LIMIT_REQUESTS_PER_MINUTE=${RATE_LIMIT_REQUESTS_PER_MINUTE:-30}
      - DATABASE_URL=postgres://gardener:${POSTGRES_PASSWORD:-gardener}@postgres:5432/gardener?sslmode=disable
      - UPLOAD_DIR=/data/uploads
      - MIGRATIONS_DIR=/migrations
      - CROPS_CONFIG_PATH=/config/crops.json
      - PROMPTS_CONFIG_PATH=/config/prompts.json
      - PHOTO_TEMPLATES_PATH=/config/photo_templates.json
      - ONBOARDING_CONFIG_PATH=/config/onboarding.json
      - BRANDING_CONFIG_PATH=/config/branding.json
      - CONFIG_RELOAD_INTERVAL_SEC=${CONFIG_RELOAD_INTERVAL_SEC:-0}
      - DATA_DIR=/app/data
      - PYTHON_BASE_URL=http://classifier:5000
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_SECRET=${ADMIN_SECRET:-}
    volumes:
      - uploads_data:/data/uploads
      - ./data:/app/data
      - ./config:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      classifier:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  webapp:
    build:
      context: .
      dockerfile: Dockerfile.webapp
    container_name: union_ai_apple_webapp
    ports:
      - "80:80"
    volumes:
      - ./webapp/index.html:/usr/share/nginx/html/index.html:ro
      - ./webapp/app.css:/usr/share/nginx/html/app.css:ro
      - ./webapp/app.js:/usr/share/nginx/html/app.js:ro
      - ./webapp/admin.html:/usr/share/nginx/html/admin.html:ro
      - ./webapp/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  models:
  chroma_data:
  bm25_data:
  postgres_data:
  uploads_data:
