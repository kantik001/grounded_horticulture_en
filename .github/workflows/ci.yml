name: CI

on:
  push:
    branches: [master, main, "feature/**", "fix/**", "feat/**"]
  pull_request:
    branches: [master, main]

# Тяжёлый rag-eval только на PR или push в master/main (не дублировать push+PR на feat-ветке).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: server/go.sum

      - name: Go mod tidy
        run: go mod tidy

      - name: Go test
        env:
          CROPS_CONFIG_PATH: ${{ github.workspace }}/config/crops.json
        run: go test -v -count=1 ./...

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Pytest
        env:
          CROPS_CONFIG_PATH: config/crops.json
        run: pytest tests/ -v --tb=short

  # Лёгкая проверка Dockerfile server/webapp (без RAG).
  docker-build-smoke:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build server and webapp images
        run: |
          chmod +x scripts/docker_build.sh
          scripts/docker_build.sh server -t doctor-gardens-server:ci
          scripts/docker_build.sh webapp -t doctor-gardens-webapp:ci

  # Classifier + reindex + eval (apple only). Полный --suite all: вручную или на release.
  docker-classifier-rag-eval:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Build classifier image
        run: |
          chmod +x scripts/docker_build.sh
          scripts/docker_build.sh classifier --build-arg SKIP_HF_BAKE=1 -t doctor-gardens-classifier:ci

      - name: Verify, reindex, and RAG eval (apple, in-process fast)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/config:/config:ro" \
            -v "${{ github.workspace }}/data:/app/data:ro" \
            -v "${{ github.workspace }}/scripts:/app/scripts:ro" \
            -v "${{ github.workspace }}/eval:/app/eval:ro" \
            -e CROPS_CONFIG_PATH=/config/crops.json \
            -e HF_TOKEN="${HF_TOKEN}" \
            -e RAG_RERANK_ENABLED=false \
            doctor-gardens-classifier:ci \
            bash -lc '
          set -e
          python -c "
          import torch, torchvision, transformers, sentence_transformers
          assert torch.__version__.startswith(\"2.5\"), torch.__version__
          assert not torch.backends.cuda.is_built()
          from rag.vector_store import load_all_documents
          print(\"docs\", len(load_all_documents()))
          "
          python scripts/reindex_rag.py
          python scripts/run_rag_eval.py --suite apple --in-process --fast --timeout 180 --workers 2
          '
