name: CI

on:
  push:
    branches: [master, main, "feature/**", "fix/**"]
  pull_request:
    branches: [master, main]

jobs:
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: server/go.sum

      - name: Go mod tidy
        run: go mod tidy

      - name: Go test
        env:
          CROPS_CONFIG_PATH: ${{ github.workspace }}/config/crops.json
        run: go test -v -count=1 ./...

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Pytest
        env:
          CROPS_CONFIG_PATH: config/crops.json
        run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -f Dockerfile.server -t doctor-gardens-server:ci .

      - name: Build webapp image
        run: docker build -f Dockerfile.webapp -t doctor-gardens-webapp:ci .

      - name: Build classifier image
        run: docker build -f Dockerfile.classifier -t doctor-gardens-classifier:ci .

      - name: Verify classifier torch and imports
        run: |
          docker run --rm doctor-gardens-classifier:ci python -c "
          import torch, torchvision, transformers, sentence_transformers
          assert torch.__version__.startswith('2.5'), torch.__version__
          from rag.vector_store import load_all_documents
          print('torch', torch.__version__, 'docs', len(load_all_documents()))
          "

  # rag-eval отключён: образ classifier:ci не переносится между job-ами GHA.
  # Прогон вручную: make docker-reindex-apply && python scripts/run_rag_eval.py --suite all
