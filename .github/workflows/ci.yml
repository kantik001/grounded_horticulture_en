name: CI

on:
  push:
    branches: [master, main, "feature/**", "fix/**", "feat/**"]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: server/go.sum

      - name: Go mod tidy
        run: go mod tidy

      - name: Go vet
        run: go vet ./...

      - name: Go test (race detector)
        env:
          CROPS_CONFIG_PATH: ${{ github.workspace }}/config/crops.json
        run: go test -v -race -count=1 ./...

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: server/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: server

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Pytest
        env:
          CROPS_CONFIG_PATH: config/crops.json
        run: pytest tests/ -v --tb=short

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check api rag cv scripts tests

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: |
          chmod +x scripts/docker_build.sh
          scripts/docker_build.sh server -t doctor-gardens-server:ci

      - name: Build webapp image
        run: scripts/docker_build.sh webapp -t doctor-gardens-webapp:ci

      - name: Build classifier image
        run: scripts/docker_build.sh classifier --build-arg SKIP_HF_BAKE=1 -t doctor-gardens-classifier:ci

      - name: Verify classifier torch and imports
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/config:/config:ro" \
            -v "${{ github.workspace }}/data:/app/data:ro" \
            -e CROPS_CONFIG_PATH=/config/crops.json \
            doctor-gardens-classifier:ci python -c "
          import torch, torchvision, transformers, sentence_transformers
          assert torch.__version__.startswith('2.5'), torch.__version__
          assert not torch.backends.cuda.is_built(), 'expected CPU-only torch build'
          from rag.vector_store import load_all_documents
          print('torch', torch.__version__, 'cuda_built', torch.backends.cuda.is_built(), 'docs', len(load_all_documents()))
          "

      # End-to-end smoke: full compose stack (postgres + classifier + server + webapp)
      # without HF model bake and RAG warmup — checks wiring, not retrieval quality.
      - name: Compose up
        env:
          SKIP_HF_BAKE: "1"
          TELEGRAM_AUTH_DISABLED: "true"
          RAG_WARMUP_ENABLED: "false"
          POSTGRES_PASSWORD: ci-postgres
          ADMIN_PASSWORD: ci-admin-password
          ADMIN_SECRET: ci-admin-secret
        run: docker compose up -d --build --wait --wait-timeout 300

      - name: API smoke test
        run: bash scripts/smoke.sh http://localhost:8080

      - name: Compose logs on failure
        if: failure()
        run: docker compose logs --tail 100

      - name: Compose down
        if: always()
        run: docker compose down -v

  # RAG retrieval eval — manual only: Actions → RAG Eval → Run workflow
  # (reindex + embeddings on CPU in PR is too slow for every push).
